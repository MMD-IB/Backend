
services:

  # ── Database PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:16          # immagine ufficiale, non serve Dockerfile
    environment:
      POSTGRES_DB: mmd_db       # nome del DB (deve coincidere col .env)
      POSTGRES_USER: mmd_user
      POSTGRES_PASSWORD: mmd_password
    ports:
      - "5432:5432"             # porta locale:porta container
    volumes:
      - postgres_data:/var/lib/postgresql/data  # i dati persistono tra riavvii

  # ── Applicazione Django ─────────────────────────────────────────
  web:
    build: .                    # usa il Dockerfile nella stessa cartella
    command: python manage.py runserver 0.0.0.0:8000
    volumes:                     # le modifiche al codice si riflettono subito
      - \mmd               # sincronizza il codice locale col container
    ports:
      - "8000:8000"
    env_file:
      - .env                    # carica le variabili d'ambiente dal tuo .env
    depends_on:
      - db                      # aspetta che il DB sia pronto prima di partire

  influxdb2:
    image: influxdb:2
    ports:
      - 8086:8086
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME_FILE: /run/secrets/influxdb2-admin-username
      DOCKER_INFLUXDB_INIT_PASSWORD_FILE: /run/secrets/influxdb2-admin-password
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN_FILE: /run/secrets/influxdb2-admin-token
      DOCKER_INFLUXDB_INIT_ORG: docs
      DOCKER_INFLUXDB_INIT_BUCKET: home
    secrets:
      - influxdb2-admin-username
      - influxdb2-admin-password
      - influxdb2-admin-token
    volumes:
      - type: volume
        source: influxdb2-data
        target: /var/lib/influxdb2
      - type: volume
        source: influxdb2-config
        target: /etc/influxdb2
secrets:
  influxdb2-admin-username:
    file: influx/.env.influxdb2-admin-username
  influxdb2-admin-password:
    file: influx/.env.influxdb2-admin-password
  influxdb2-admin-token:
    file: influx/.env.influxdb2-admin-token
volumes:
  postgres_data:             # volume named: i dati PostgreSQL sopravvivono
  influxdb2-data:
  influxdb2-config:


