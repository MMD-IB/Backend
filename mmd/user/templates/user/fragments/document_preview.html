<div class="modal-box w-11/12 max-w-5xl">
    <h3 class="font-bold text-lg">{{ document.title }}</h3>
    <div class="py-4">
        <div class="bg-base-200 p-4 rounded-lg max-h-96 overflow-y-auto font-mono text-sm whitespace-pre-wrap">
            {% if content %}
                {{ content }}
            {% else %}
                <p class="text-base-content/50 italic">Nessun contenuto disponibile per questo documento.</p>
            {% endif %}
        </div>
    </div>
    <div class="modal-action">
        <form method="dialog">
            <button class="btn">Chiudi</button>
        </form>
    </div>
</div>
<form method="dialog" class="modal-backdrop">   
    <button>close</button>
</form>
