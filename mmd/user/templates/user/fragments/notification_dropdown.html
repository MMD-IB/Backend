{% if notifications %}
{% for n in notifications %}
<li class="px-4 py-3 hover:bg-base-200 transition-colors">
    <p class="text-sm font-medium text-base-content leading-snug">{{ n.message }}</p>
    <span class="text-xs text-base-content/40">{{ n.notification_date|date:"d M Y, H:i" }}</span>
</li>
{% endfor %}
{% else %}
<li class="px-4 py-8 text-center text-sm text-base-content/40">
    Nessuna nuova notifica
</li>
{% endif %}
