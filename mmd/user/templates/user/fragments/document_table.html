<div id="document-table-container">
    <div class="overflow-x-auto">
        <table class="table w-full">
            <thead>
                <tr>
                    <th>Nome File</th>
                    <th>Data Caricamento</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                {% for doc in documents|slice:":5" %}
                <tr class="hover">
                    <td class="font-medium">{{ doc.title }}</td>
                    <td class="text-xs text-base-content/60">{{ doc.created_at|date:"d/m/Y" }}</td>
                    <td>
                        <button class="btn btn-ghost btn-xs text-primary">Visualizza</button>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center py-8 text-base-content/40">Nessun documento caricato
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="flex justify-center mt-8">
        <div class="join">
            <button class="join-item btn btn-sm btn-disabled">«</button>
            <button class="join-item btn btn-sm btn-active">1</button>
            <button class="join-item btn btn-sm">2</button>
            <button class="join-item btn btn-sm">3</button>
            <button class="join-item btn btn-sm">»</button>
        </div>
    </div>
</div>
