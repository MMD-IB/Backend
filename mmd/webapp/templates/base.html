{% load static %}
<!DOCTYPE html>
<html lang="it" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}DocSearch{% endblock %}</title>
    <link href="{% static 'css/output.css' %}" rel="stylesheet" type="text/css" />
    <script src="{% static 'js/main.js' %}" defer></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body class="min-h-screen bg-base-200 text-base-content" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    {% if user.is_authenticated or id_user %}
    {% include "sidebar.html" %}
    {% endif %}

    <main
        class="{% if user.is_authenticated or id_user %}ml-64 p-8{% else %}{% block main_class %}{% endblock %}{% endif %} min-h-screen">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="toast toast-end toast-bottom z-50"></div>

    <script>
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });

        document.body.addEventListener('htmx:afterOnLoad', function (evt) {
            const toastMessage = evt.detail.xhr.getResponseHeader('HX-Toast');
            if (toastMessage) {
                showToast(toastMessage);
            }
        });

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `alert alert-${type} shadow-lg max-w-sm transition-all duration-500 opacity-100`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-2');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        document.body.addEventListener('newMessage', function (evt) {
            showToast(evt.detail.value, 'success');
        });
    </script>

</body>

</html>
